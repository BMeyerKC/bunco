<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bunco Standings</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/base.css" />
</head>
<body>

  <div class="container py-4" style="max-width: 600px;">

    <!-- Shown only when no ?code= param in URL -->
    <div id="no-code-section" style="display:none;" class="text-center py-5">
      <h2 class="mb-4">Watch a Game</h2>
      <form id="code-form" class="d-flex gap-2 justify-content-center">
        <input id="code-input" type="text" class="form-control form-control-lg text-center"
               placeholder="Game code" maxlength="4" autocomplete="off"
               style="max-width:140px; text-transform:uppercase; letter-spacing:0.15em;" />
        <button type="submit" class="btn btn-light">Watch</button>
      </form>
    </div>

    <!-- Shown when ?code= param is present -->
    <div id="standings-section">
      <div class="d-flex align-items-center mb-4">
        <a id="back-link" href="index.html" class="btn btn-sm btn-outline-secondary me-3">← Home</a>
        <h2 class="mb-0" id="standings-title">Standings</h2>
      </div>

    <div id="round-indicator" class="text-muted mb-3"></div>

    <!-- Live table cards — shown once seats are assigned -->
    <div id="table-cards" class="mb-4"></div>

    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>Player</th>
          <th class="text-center">W</th>
          <th class="text-center">L</th>
          <th class="text-center">Buncos</th>
          <th class="text-center">Points</th>
        </tr>
      </thead>
      <tbody id="standings-body">
        <tr><td colspan="5" class="text-center text-muted">Loading…</td></tr>
      </tbody>
    </table>

    <!-- AdSense — shown only on final standings -->
    <div id="ad-slot" style="display:none; min-height:90px; text-align:center; margin-top:24px;">
      <!-- Google AdSense ad unit goes here -->
    </div>
    </div><!-- #standings-section -->

  </div><!-- .container -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { watchGame, watchAllTableScores } from './js/firebase.js';
    import { getParam } from './js/ui.js';
    import { buildTableLayout } from './js/game-logic.js';
    import { renderTableCards } from './js/table-cards.js';

    const esc = s => String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

    const code    = getParam('code');
    const isFinal = getParam('final') === 'true';

    if (!code) {
      document.getElementById('no-code-section').style.display  = '';
      document.getElementById('standings-section').style.display = 'none';
      document.getElementById('code-form').addEventListener('submit', e => {
        e.preventDefault();
        const val = document.getElementById('code-input').value.trim().toUpperCase();
        if (val.length === 4) window.location.href = `standings.html?code=${val}`;
      });
    } else {
      document.getElementById('back-link').href = `game.html?code=${code}`;

      if (isFinal) {
        document.getElementById('standings-title').textContent = 'Final Standings';
        document.getElementById('ad-slot').style.display = '';
      }

      let tableScoreUnsub = null;
      let watchedRound    = 0;
      let latestTables    = [];

      const unwatchGame = watchGame(code, data => {
        if (!data) return;

        const round = data.meta?.currentRound || 0;

        document.getElementById('round-indicator').textContent =
          isFinal       ? 'Game complete!'
          : round === 0 ? 'Waiting for Round 1…'
          :               `Round ${round} of 6 — Live`;

        // Live table cards
        const tableCardsEl = document.getElementById('table-cards');
        if (data.rounds?.[1]?.assignments && tableCardsEl) {
          latestTables = buildTableLayout(data.players || {}, data.rounds[1].assignments, data.meta.tables);

          if (round >= 1 && round !== watchedRound) {
            if (tableScoreUnsub) tableScoreUnsub();
            watchedRound    = round;
            tableScoreUnsub = watchAllTableScores(code, round, scores => {
              renderTableCards(tableCardsEl, latestTables, scores);
            });
          } else if (round === 0) {
            renderTableCards(tableCardsEl, latestTables, {});
          }
        }

        // Cumulative standings table
        const players   = data.players   || {};
        const standings = data.standings || {};

        const rows = Object.entries(players)
          .filter(([, p]) => !p.isGhost)
          .map(([id, p]) => ({
            name:   p.name,
            wins:   standings[id]?.wins        || 0,
            losses: standings[id]?.losses      || 0,
            buncos: standings[id]?.buncos      || 0,
            points: standings[id]?.totalPoints || 0,
          }))
          .sort((a, b) => b.wins - a.wins || b.buncos - a.buncos || b.points - a.points);

        const tbody = document.getElementById('standings-body');
        tbody.innerHTML = rows.map((r, i) => `
          <tr ${i === 0 && isFinal ? 'class="table-warning"' : ''}>
            <td>${esc(r.name)}${i === 0 && isFinal ? ' 🏆' : ''}</td>
            <td class="text-center">${r.wins}</td>
            <td class="text-center">${r.losses}</td>
            <td class="text-center">${r.buncos}</td>
            <td class="text-center">${r.points}</td>
          </tr>
        `).join('');
      });

      window.addEventListener('pagehide', () => {
        unwatchGame();
        if (tableScoreUnsub) tableScoreUnsub();
      });
    }
  </script>

</body>
</html>
